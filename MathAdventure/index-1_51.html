<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Sense Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="start-screen">
            <h1>MATH SENSE<br>ADVENTURE</h1>
            <p>Master Factors & Multiples!</p>
            <div id="controls-hint">
                [Arrow Keys] to Move<br>
                [Mouse Click] to Shoot Numbers
            </div>
            <button id="start-button">START MISSION</button>
        </div>

        <div id="hud" style="display: none;">
            <div id="room-info">Room: <span id="room-num">1</span></div>
            <div id="target-display"><span id="target-label">Factor of target:</span> <span id="target-val">12</span></div>
            <div id="score-display">Score: <span id="score">0</span> / <span id="goal-score">1000</span></div>
            <div id="health-display">HP: <span id="hp">❤❤❤</span></div>
        </div>

        <div id="factor-checklist" style="display: none;">
            Factors to find: <span id="checklist-items"></span>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="instructions" style="display: none;">
            [Arrow Keys] Move | [Click] Shoot | Collect all factors!
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
