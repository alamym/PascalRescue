<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PascaRescue: The MSA Value Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Top Status Bar -->
        <header>
            <div class="logo">
                <h1>PASCAL RESCUE</h1>
                <p>The Marlborough Science Academy Mission</p>
            </div>
            <div id="stats">
                <div class="stat-box">Teachers Rescued: <span id="teacher-count">0</span>/5</div>
                <div class="stat-box">Progress: <span id="overall-progress">0%</span></div>
            </div>
        </header>

        <!-- School Values Badges Tray -->
        <div id="badge-tray">
            <div class="badge-slot" id="badge-dignity" title="DIGNITY">⚖️</div>
            <div class="badge-slot" id="badge-kindness" title="KINDNESS">🤝</div>
            <div class="badge-slot" id="badge-compassion" title="COMPASSION">❤️</div>
            <div class="badge-slot" id="badge-courage" title="COURAGE">🦁</div>
            <div class="badge-slot" id="badge-endeavour" title="ENDEAVOUR">🛠️</div>
        </div>

        <!-- Map Screen (Pascal Building Blueprint) -->
        <main id="map-screen">
            <div class="blueprint-container">
                <div class="floor-label">MSA CAMPUS: PASCAL BUILDING</div>

                <!-- HQ - Final Challenge -->
                <div class="floor-row locked" id="floor-hq">
                    <span class="floor-num">HQ</span>
                    <div class="rooms-container">
                        <button class="boss-btn locked" data-room-id="0" disabled>RESCUE HEAD OF MATH</button>
                    </div>
                </div>

                <!-- 4F - Data & Probability -->
                <div class="floor-row locked" id="floor-4">
                    <span class="floor-num">4F</span>
                    <div class="rooms-container">
                        <button class="room-btn locked" data-room-id="401" disabled>401: Chance</button>
                        <button class="room-btn locked" data-room-id="402" disabled>402: Charts</button>
                        <button class="boss-btn locked" data-room-id="400" disabled>COURAGE BOSS</button>
                    </div>
                </div>

                <!-- 3F - Ratio & Shape -->
                <div class="floor-row locked" id="floor-3">
                    <span class="floor-num">3F</span>
                    <div class="rooms-container">
                        <button class="room-btn locked" data-room-id="301" disabled>301: Ratio</button>
                        <button class="room-btn locked" data-room-id="302" disabled>302: Angles</button>
                        <button class="room-btn locked" data-room-id="303" disabled>303: Perimeter</button>
                        <button class="boss-btn locked" data-room-id="300" disabled>COMPASSION BOSS</button>
                    </div>
                </div>

                <!-- 2F - Algebra -->
                <div class="floor-row locked" id="floor-2">
                    <span class="floor-num">2F</span>
                    <div class="rooms-container">
                        <button class="room-btn locked" data-room-id="201" disabled>201: Expression</button>
                        <button class="room-btn locked" data-room-id="202" disabled>202: Equation</button>
                        <button class="boss-btn locked" data-room-id="200" disabled>KINDNESS BOSS</button>
                    </div>
                </div>

                <!-- 1F - Number -->
                <div class="floor-row active" id="floor-1">
                    <span class="floor-num">1F</span>
                    <div class="rooms-container">
                        <button class="room-btn" data-room-id="101">101: Multiples</button>
                        <button class="room-btn locked" data-room-id="102" disabled>102: Negatives</button>
                        <button class="room-btn locked" data-room-id="103" disabled>103: Fractions</button>
                        <button class="boss-btn locked" data-room-id="100" disabled>DIGNITY BOSS</button>
                    </div>
                </div>
            </div>
            <div class="school-motto">"Manners maketh man."</div>
        </main>

        <!-- Battle Screen -->
        <section id="battle-screen" class="hidden">
            <div class="battle-header">
                <div id="room-header">
                    <span id="room-name">Room</span> - <span id="battle-phase">Stage 1</span>
                    <span id="timer-box" class="hidden"> | ⏱️ <span id="time-left">60</span>s</span>
                </div>
                <div class="hp-bar-container">
                    <div id="enemy-hp" class="hp-bar"></div>
                </div>
            </div>
            <div class="visual-area">
                <div id="player-sprite">🛡️ Warrior</div>
                <div id="enemy-container">
                    <div id="enemy-sprite">👾</div>
                    <div id="enemy-name">Math Imp</div>
                </div>
                <div id="effect-layer"></div>
            </div>
            <div class="interaction-area">
                <div id="question-box">
                    <p id="question-text">Loading...</p>
                    <div class="input-group">
                        <input type="text" id="answer-input" placeholder="?" autofocus>
                        <button id="attack-btn">SOLVE</button>
                    </div>
                </div>
                <div id="math-hint" class="hidden"></div>
            </div>
        </section>

        <!-- Victory Screen -->
        <section id="victory-screen" class="hidden">
            <div class="celebration-box">
                <div class="confetti"></div>
                <h1 id="victory-title">VICTORY! 🏆</h1>
                <p id="victory-text">You have rescued a teacher!</p>
                <div id="victory-badge" class="reward-badge">✨</div>
                <button class="continue-btn" onclick="showMap()">Return to Map</button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
